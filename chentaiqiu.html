<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>互动古文教学平台 - 世说新语·陈太丘与友期行</title>
    <!-- 引入独立页面经典样式 -->
    <link rel="stylesheet" href="classic_style.css">
    
    <!-- 🎯 满血加载：陈太丘与友期行全新 5 大专属 JS 数据包家族 -->
    <script src="chen_text.js"></script>
    <script src="chen_translation.js"></script>
    <script src="chen_analysis.js"></script>
    <script src="chen_quiz.js"></script>
    <script src="chen_shortq.js"></script>

    <style>
        /* 🔒 响应式弹窗防火墙：PC端追踪悬浮，手机Sites内嵌端自动转换为“中央绝对不切弹窗” */
        .floating-tooltip {
            position: fixed !important;
            z-index: 9999 !important;
            background: #ffffff !important;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.15), 0 10px 10px -5px rgba(0, 0, 0, 0.1) !important;
            border-radius: 14px !important;
            transition: transform 0.2s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.2s ease !important;
            box-sizing: border-box !important;
        }

        /* 当手机屏幕尺寸小于 768px 时，锁定屏幕物理垂直和水平正中央，强制阻断 Google Sites 边框和工具栏遮挡 */
        @media (max-width: 768px) {
            .floating-tooltip {
                position: fixed !important;
                top: 50% !important;
                left: 50% !important;
                bottom: auto !important;
                right: auto !important;
                transform: translate(-50%, -42%) scale(0.92) !important; /* 优雅的缩放微调 */
                width: 90% !important;
                max-width: 330px !important;
                padding: 20px 20px 24px 20px !important;
                border-radius: 16px !important;
                opacity: 0;
            }
            .floating-tooltip.show {
                transform: translate(-50%, -50%) scale(1) !important;
                opacity: 1 !important;
            }
            .floating-tooltip::after {
                content: "点击空白处关闭弹窗";
                display: block;
                text-align: center;
                font-size: 0.75rem;
                color: #94a3b8;
                margin-top: 14px;
                border-top: 1px dashed #f1f5f9;
                padding-top: 8px;
            }
        }
    </style>
</head>
<body>
 
<div class="app-container">
    <!-- 高端定制：魏晋名士专属横线作者面板 -->
    <div class="header-section" style="text-align: center !important; margin-bottom: 30px !important;">
        <h1 class="title" style="font-family: 'Noto Serif SC', 'SimSun', serif !important; font-size: 2.3rem !important; font-weight: bold !important; color: #0f172a !important; margin-bottom: 12px !important; letter-spacing: 2px !important;">陈太丘与友期行</h1>
        
        <div class="author-wrapper" style="display: flex !important; align-items: center !important; justify-content: center !important; gap: 15px !important; max-width: 600px !important; margin: 0 auto !important;">
            <div style="flex: 1 !important; height: 1px !important; background: linear-gradient(to left, #cbd5e1, transparent) !important;"></div>
            <p class="author" style="font-size: 0.95rem !important; color: #64748b !important; margin: 0 !important; white-space: nowrap !important; font-family: system-ui, -apple-system, sans-serif !important; letter-spacing: 0.5px !important;">
                刘义庆《世说新语·方正》 / Liu Yiqing
            </p>
            <div style="flex: 1 !important; height: 1px !important; background: linear-gradient(to right, #cbd5e1, transparent) !important;"></div>
        </div>
    </div>
    
    <div class="poem-container">
        <!-- 古文原文动态容器 -->
        <div id="dynamic-poem-container"></div>
        
        <!-- 白话翻译动态容器（支持一键展开/收起） -->
        <div class="translation-block" id="translationBlock">
            <div class="translation-header" id="translationHeader">
                <div class="translation-title"><span>📖</span> 白话翻译 / Translation</div>
                <div class="toggle-icon" id="toggleIcon">▶</div>
            </div>
            <div class="translation-content" id="translationContent"></div>
        </div>
    </div>
    
    <!-- 🗣️ 拼音与英文辅助控制面板 -->
    <div class="controls-wrapper">
        <div class="control-panel"><div class="control-label">🗣️ 拼音辅助 <span>(Pinyin)</span></div><label class="switch"><input type="checkbox" id="pinyin-toggle"><span class="slider"></span></label></div>
        <div class="control-panel"><div class="control-label">🔤 英文辅助 <span>(English)</span></div><label class="switch"><input type="checkbox" id="en-toggle"><span class="slider"></span></label></div>
    </div>

    <!-- 🎯 底部课件三大行动操作功能群 -->
    <div class="action-group">
        <button class="action-btn btn-analysis" id="toggle-analysis-btn"><span class="btn-icon">📜</span> 展开核心赏析</button>
        <button class="action-btn btn-quiz" id="toggle-quiz-btn"><span class="btn-icon">🎯</span> 客观题自测</button>
        <button class="action-btn btn-shortq" id="toggle-shortq-btn"><span class="btn-icon">✍️</span> 简答题特训</button>
    </div>
 
    <!-- 抽屉动态内容承载容器 -->
    <div class="collapsible-content" id="analysis-content"></div>
    <div class="collapsible-content" id="quiz-content"><div id="quiz-dynamic-container"></div></div>
    <div class="collapsible-content" id="shortq-content"></div>
</div>
 
<!-- 🔒 中央居中高显遮罩弹窗（PC端悬浮，手机端Sites内嵌强制居中防火墙） -->
<div class="floating-tooltip" id="tooltip">
    <div class="exp-header"><span class="exp-word" id="disp-word"></span><span class="exp-pinyin" id="disp-pinyin"></span><span class="exam-tag" id="exam-tag">核心词</span></div>
    <div class="exp-zh" id="disp-zh"></div>
    <div class="exp-en" id="disp-en"></div>
</div>
 
<script>
    const currentChapterId = "chapter_1"; // 单章固定 ID 架构

    // 【像素级注音对齐拦截核心】：过滤英文字母、数字和斜杠，底层自动注入透明 &nbsp;
    function alignText(zh, py) {
        if (!zh) return '';
        const chars = zh.trim().split('');
        const pys = py ? py.trim().split(/\s+/) : [];
        let pIdx = 0;
        let html = '';
        
        for (let c of chars) {
            if (/[0-9a-zA-Z\.\/\\\,，。？！：“”‘’（）《》、\-\:；—\(\)→\s]/.test(c)) {
                html += `<span class="char-box"><span class="py-text" style="visibility: hidden;">&nbsp;</span><span class="punctuation">${c}</span></span>`;
            } else {
                const p = pys[pIdx] || '';
                html += `<span class="char-box"><span class="py-text">${p}</span><span class="zh-text">${c}</span></span>`;
                pIdx++;
            }
        }
        return html;
    }

    // 【同步前缀过滤器】：放空 A. B. C. D. 和序号的拼音位
    function alignTextWithPrefix(prefix, zh, py) {
        if (!zh) return '';
        const chars = zh.trim().split('');
        const pys = py ? py.trim().split(/\s+/) : [];
        let html = '';
        
        html += `<span class="char-box" style="margin-right: 8px !important;"><span class="py-text">&nbsp;</span><span class="zh-text" style="font-weight: bold; color: #1e293b;">${prefix}</span></span>`;
        
        let pIdx = 0;
        for (let c of chars) {
            if (/[0-9a-zA-Z\.\/\\\,，。？！：“”‘’（）《》、\-\:；—\(\)→\s]/.test(c)) {
                html += `<span class="char-box"><span class="py-text" style="visibility: hidden;">&nbsp;</span><span class="punctuation">${c}</span></span>`;
            } else {
                const p = pys[pIdx] || '';
                html += `<span class="char-box"><span class="py-text">${p}</span><span class="zh-text">${c}</span></span>`;
                pIdx++;
            }
        }
        return html;
    }

    window.onload = function() {
        renderPoem();
        renderTranslation();
        renderAnalysis();
        renderShortQ();
        renderQuizCards();
        rebindWordClicks();
        initInteractions();
    };

    // 🎯 核心改装点：完全仿照《穿井得一人》打造的“左对齐 + 开头缩进 + 中间精准顶开两行空行”功能引擎
    function renderPoem() {
        const container = document.getElementById('dynamic-poem-container');
        const data = poemData[currentChapterId] || [];
        
        // 🚀 起始段落：完全移除居中命令，直接采用全局左对齐机制（自动继承 classic_style.css 的两格缩进）
        let html = '<div class="poem-paragraph">'; 
        
        data.forEach((w, index) => {
            if(w.punc) {
                html += `<span class="punctuation">${w.text.trim()}</span>`;
                
                // 🛑 智能断句节点拦截器：遇到一句话说完了，或者引号闭合处，立刻切断换行
                if (w.text.trim() === '。' || w.text.trim() === '！' || w.text.trim() === '？' || w.text.trim() === '”') {
                    
                    // 只要不是全篇文言文的最后一行，就在段落拼接处注入两个透明占位盒，物理顶开两行的垂直空间
                    if (index < data.length - 3) {
                        html += `</div>
                                 <!-- 🚀 精准炸开两行空行，无视 Sites 高度限制 -->
                                 <div class="poem-paragraph" style="visibility: hidden !important; line-height: 1 !important; height: 18px !important; margin: 0 !important; padding: 0 !important;">&nbsp;</div>
                                 <div class="poem-paragraph" style="visibility: hidden !important; line-height: 1 !important; height: 18px !important; margin: 0 !important; padding: 0 !important;">&nbsp;</div>
                                 <!-- 开启全新小段落，完美首行空两格 -->
                                 <div class="poem-paragraph">`;
                    }
                }
            } else {
                let examClass = w.exam ? ' word exam-focus' : ' word';
                let examAttr = w.exam ? ' data-exam="true"' : '';
                html += `<span class="${examClass}" data-text="${w.text.trim()}" data-pinyin="${w.py}" data-zh="${w.zh}" data-en="${w.en}"${examAttr}>${alignText(w.text, w.py)}</span>`;
            }
        });
        
        html += '</div>';
        container.innerHTML = html;
    }

    function renderTranslation() {
        const container = document.getElementById('translationContent');
        const data = translationData[currentChapterId] || [];
        let html = '';
        data.forEach((item, index) => {
            if(index > 0) html += '<div class="trans-divider"></div>';
            html += `
                <div class="trans-text-line">
                    <div class="trans-zh">${alignText(item.zh, item.py)}</div>
                    <div class="trans-en">${item.en}</div>
                </div>`;
        });
        container.innerHTML = html;
    }

    function renderAnalysis() {
        const container = document.getElementById('analysis-content');
        const data = analysisData[currentChapterId] || [];
        let html = '';
        data.forEach(item => {
            html += `
                <div class="analysis-card">
                    <div class="ana-title-group">
                        <h4 class="ana-header">${alignText(item.header, item.headerPy)}</h4>
                        <div class="ana-en">${item.en}</div>
                    </div>
                    <div class="ana-text-group">
                        <p class="ana-zh">${alignText(item.textZh, item.textPy)}</p>
                        <div class="ana-en">${item.textEn}</div>
                    </div>
                </div>`;
        });
        container.innerHTML = html;
    }

    function renderShortQ() {
        const container = document.getElementById('shortq-content');
        if (!container) return;
        const data = shortQData[currentChapterId] || [];
        let html = '';
        data.forEach(item => {
            let strategyZhHtml = '';
            item.sZh.forEach((lineText, lineIdx) => {
                if(lineIdx > 0) strategyZhHtml += '<br>';
                const linePy = item.sPy && item.sPy[lineIdx] ? item.sPy[lineIdx] : '';
                strategyZhHtml += `<span class="strategy-step-line">${alignText(lineText, linePy)}</span>`;
            });

            html += `
                <div class="sa-card">
                    <div class="sa-q-header">
                        <div class="sa-q-num-box"><span class="sa-q-num">${item.id}</span></div>
                        <div class="q-text-group"><h4 class="q-zh">${alignText(item.qZh, item.qPy)}</h4></div>
                    </div>
                    <div class="q-en">${item.qEn}</div>
                    <div class="strategy-box">
                        <div class="strategy-title">💡 答题思路</div>
                        <div class="strategy-zh" style="display: block !important; line-height: 2.6 !important;">${strategyZhHtml}</div>
                        <div class="strategy-en">${item.sEn}</div>
                    </div>
                    <button class="sa-answer-btn" onclick="toggleAnswer(this)">📖 点击查看参考答案</button>
                    <div class="sa-answer-box">
                        <div class="sa-model-answer">
                            <div class="sa-badge">参考答案</div>
                            <div class="sa-zh">${alignText(item.aZh, item.aPy)}</div>
                            <div class="sa-en">${item.aEn}</div>
                        </div>
                    </div>
                </div>`;
        });
        container.innerHTML = html;
    }

    function shuffleArray(arr) {
        for (let i = arr.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [arr[i], arr[j]] = [arr[j], arr[i]];
        }
        return arr;
    }
    
    function renderQuizCards() {
        const container = document.getElementById('quiz-dynamic-container');
        if (!container) return;
        container.innerHTML = '';
        const data = quizQuestions[currentChapterId] || [];
        if (data.length === 0) return;
        
        const currentQuestions = JSON.parse(JSON.stringify(data));
        
        currentQuestions.forEach(q => {
            shuffleArray(q.options); 
            const card = document.createElement('div');
            card.className = 'quiz-card';
            let optionsHtml = '';
            const letters = ['A.', 'B.', 'C.', 'D.'];
            
            q.options.forEach((opt, idx) => {
                optionsHtml += `
                    <button class="option-btn" data-correct="${opt.correct}" data-explanation-correct="${opt.correct ? opt.explanation : ''}" data-explanation-correct-py="${opt.correct ? opt.explanationPy : ''}" data-explanation-correct-en="${opt.correct ? opt.enExplanation : ''}" data-explanation-wrong="${!opt.correct ? opt.explanation : ''}" data-explanation-wrong-py="${!opt.correct ? opt.explanationPy : ''}" data-explanation-wrong-en="${!opt.correct ? opt.enExplanation : ''}" data-opt-text="${opt.text}" data-opt-py="${opt.py}">
                        <div class="opt-zh">${alignTextWithPrefix(letters[idx], opt.text, opt.py)}</div>
                        <div class="quiz-option-en">${opt.en}</div>
                    </button>`;
            });
            
            card.innerHTML = `
                <div class="question-header">
                    <div class="q-zh-wrapper">${alignTextWithPrefix(q.id + '.', q.text, q.py)}</div>
                    <div class="q-en">${q.en}</div>
                </div>
                <div class="options-area">${optionsHtml}</div>
                <div class="feedback"></div>`;
            container.appendChild(card);
            
            const btns = card.querySelectorAll('.option-btn');
            const fbDiv = card.querySelector('.feedback');
            btns.forEach(btn => {
                btn.addEventListener('click', function() {
                    if (this.disabled) return;
                    const isCorrect = this.getAttribute('data-correct') === 'true';
                    const correctBtn = Array.from(btns).find(b => b.getAttribute('data-correct') === 'true');
                    const correctOptText = correctBtn ? correctBtn.getAttribute('data-opt-text') : '正确选项';
                    
                    btns.forEach(b => b.disabled = true);
                    if (isCorrect) {
                        this.classList.add('correct');
                        fbDiv.className = 'feedback success';
                        fbDiv.innerHTML = `
                            <div class="fb-line"><span class="fb-label success-txt">✅ 回答正确！</span></div>
                            <div class="fb-line"><span class="fb-label">📖 答案解析：</span><span class="fb-content">${alignText(this.getAttribute('data-explanation-correct'), this.getAttribute('data-explanation-correct-py'))}</span></div>
                            <div class="fb-en">💬 Correct Explanation: ${this.getAttribute('data-explanation-correct-en')}</div>`;
                    } else {
                        this.classList.add('wrong');
                        fbDiv.className = 'feedback error';
                        fbDiv.innerHTML = `
                            <div class="fb-line"><span class="fb-label error-txt">❌ 回答错误。正确答案是：</span><span class="fb-content-main">${correctOptText}</span></div>
                            <div class="fb-line" style="margin-top: 8px;"><span class="fb-label">📖 错误选项分析：</span><span class="fb-content">${alignText(this.getAttribute('data-explanation-wrong'), this.getAttribute('data-explanation-wrong-py'))}</span></div>
                            <div class="fb-en">💬 Your Choice Analysis: ${this.getAttribute('data-explanation-wrong-en')}</div>
                            <div class="fb-line" style="margin-top: 8px;"><span class="fb-label">📖 正确选项解析：</span><span class="fb-content">${alignText(correctBtn.getAttribute('data-explanation-correct'), correctBtn.getAttribute('data-explanation-correct-py'))}</span></div>
                            <div class="fb-en">💬 Correct Option Analysis: ${correctBtn.getAttribute('data-explanation-correct-en')}</div>`;
                    }
                });
            });
        });
    }

    // 重新绑定字词追踪器，拦截手机 Sites 的边缘裁剪
    function rebindWordClicks() {
        const words = document.querySelectorAll('.word');
        const tooltip = document.getElementById('tooltip');
        const dispWord = document.getElementById('disp-word');
        const dispPinyin = document.getElementById('disp-pinyin');
        const dispZh = document.getElementById('disp-zh');
        const dispEn = document.getElementById('disp-en');
        const examTag = document.getElementById('exam-tag');

        words.forEach(word => {
            word.addEventListener('click', function(e) {
                e.stopPropagation();
                words.forEach(w => w.classList.remove('active'));
                this.classList.add('active');
                
                dispWord.innerText = this.getAttribute('data-text');
                dispPinyin.innerText = this.getAttribute('data-pinyin');
                dispZh.innerHTML = `<strong>释义：</strong> ${this.getAttribute('data-zh')}`;
                dispEn.innerText = this.getAttribute('data-en');
                examTag.style.display = (this.getAttribute('data-exam') === 'true') ? 'inline-block' : 'none';
                
                tooltip.style.display = 'block';
                
                if (window.innerWidth <= 768) {
                    tooltip.style.top = '50%';
                    tooltip.style.left = '50%';
                } else {
                    const rect = this.getBoundingClientRect();
                    tooltip.style.top = `${rect.top + window.scrollY - tooltip.offsetHeight - 20}px`;
                    tooltip.style.left = `${rect.left + window.scrollX + rect.width / 2}px`;
                }
                setTimeout(() => tooltip.classList.add('show'), 10);
            });
        });
    }

    function initInteractions() {
        const translationHeader = document.getElementById('translationHeader');
        const translationContent = document.getElementById('translationContent');
        const toggleIcon = document.getElementById('toggleIcon');
        translationHeader.addEventListener('click', function() {
            if (translationContent.classList.contains('show')) {
                translationContent.classList.remove('show');
                toggleIcon.textContent = '▶';
            } else {
                translationContent.classList.add('show');
                toggleIcon.textContent = '▼';
            }
        });
        
        const pinyinToggle = document.getElementById('pinyin-toggle');
        const enToggle = document.getElementById('en-toggle');
        
        document.body.classList.add('hide-pinyin', 'hide-english');
        pinyinToggle.addEventListener('change', function() { 
            if (this.checked) document.body.classList.remove('hide-pinyin'); 
            else document.body.classList.add('hide-pinyin'); 
        });
        enToggle.addEventListener('change', function() { 
            if (this.checked) document.body.classList.remove('hide-english'); 
            else document.body.classList.add('hide-english'); 
        });
        
        document.addEventListener('click', function(e) {
            const tooltip = document.getElementById('tooltip');
            if (!tooltip.contains(e.target) && !e.target.closest('.word')) {
                tooltip.classList.remove('show');
                document.querySelectorAll('.word').forEach(w => w.classList.remove('active'));
                setTimeout(() => { if (!tooltip.classList.contains('show')) tooltip.style.display = 'none'; }, 300);
            }
        });

        const panels = [
            { btnId: 'toggle-analysis-btn', contentId: 'analysis-content', defaultHTML: '<span class="btn-icon">📜</span> 展开核心赏析', defaultBg: 'linear-gradient(135deg, #10b981, #059669)' },
            { btnId: 'toggle-quiz-btn', contentId: 'quiz-content', defaultHTML: '<span class="btn-icon">🎯</span> 客观题自测', defaultBg: 'linear-gradient(135deg, #3b82f6, #2563eb)' },
            { btnId: 'toggle-shortq-btn', contentId: 'shortq-content', defaultHTML: '<span class="btn-icon">✍️</span> 简答题特训', defaultBg: 'linear-gradient(135deg, #8b5cf6, #6d28d9)' }
        ];
        
        panels.forEach(panel => {
            const btn = document.getElementById(panel.btnId);
            btn.addEventListener('click', function() {
                const content = document.getElementById(panel.contentId);
                const isOpen = content.style.display === 'block';
                
                panels.forEach(p => {
                    document.getElementById(p.contentId).style.display = 'none';
                    const pb = document.getElementById(p.btnId);
                    pb.innerHTML = p.defaultHTML;
                    pb.style.background = p.defaultBg;
                });
                
                if (!isOpen) { 
                    content.style.display = 'block'; 
                    btn.innerHTML = '<span class="btn-icon">⬆️</span> 收起当前面板'; 
                    btn.style.background = '#64748b';
                    if (panel.btnId === 'toggle-quiz-btn') renderQuizCards();
                }
            });
        });
    }

    function toggleAnswer(btn) {
        const answerBox = btn.nextElementSibling;
        if (answerBox.style.display === 'block') {
            answerBox.style.display = 'none';
            btn.innerHTML = '📖 点击查看参考答案';
        } else {
            answerBox.style.display = 'block';
            btn.innerHTML = '📖 收起答案';
        }
    }
</script>
</body>
</html>
